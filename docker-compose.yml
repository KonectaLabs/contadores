services:
  traefik:
    image: traefik:v3.3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command:
      - "--providers.file.filename=/etc/traefik/dynamic/dynamic.yml"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./traefik:/etc/traefik/dynamic:ro

  backend:
    build: .
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    environment:
      - PYTHONPATH=/app/src
      - CODEX_HOME=${CODEX_HOME:-/app/data/codex-home}
      - CODEX_PREFER_CHATGPT_LOGIN=${CODEX_PREFER_CHATGPT_LOGIN:-true}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health', timeout=2).status == 200 else sys.exit(1)",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    volumes:
      - ./data:/app/data
      - ./auth.toml:/app/auth.toml:ro
    user: "0:0"

  bot:
    build:
      context: .
      dockerfile: src/bot/Dockerfile
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file: .env
    volumes:
      - ./data:/app/data
    environment:
      - BACKEND_BASE_URL=http://backend:8000
      - BOT_TICK_SECONDS=5
      - BACKEND_BOOT_TIMEOUT_SECONDS=120
      - BACKEND_BOOT_POLL_SECONDS=2
      - WHATSAPP_DISPATCH_DELAY_MIN_SECONDS=2700
      - WHATSAPP_DISPATCH_DELAY_MAX_SECONDS=2700
    depends_on:
      backend:
        condition: service_healthy
    command: ["uv", "run", "fastapi", "run", "main.py", "--host", "0.0.0.0", "--port", "8100"]
